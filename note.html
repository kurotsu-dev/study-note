<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Study Note</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="title"></h1>

        <div class="back-area">
            <button id="backButton">
                ← 戻る
            </button>
        </div>

        <hr>

        <div class="input-area">

            <input
                type="text"
                id="itemInput"
                placeholder="例：headとは"
            >

            <button id="addItemButton">
                項目追加
            </button>

        </div>

        <h2>項目一覧</h2>

        <div id="itemList"></div>

    </div>

    <script src="note.js"></script>

</body>

</html>
